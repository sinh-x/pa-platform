name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Check generated completions
        run: |
          pnpm run completions
          git diff --exit-code -- completions/pa-core.fish completions/opa.fish

      - name: Install fish
        run: sudo apt-get update && sudo apt-get install -y fish

      - name: Check fish completions
        run: |
          fish --no-execute completions/pa-core.fish
          fish --no-execute completions/opa.fish
