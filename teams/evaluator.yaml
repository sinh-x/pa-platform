# Dedicated independent deployment evaluator team.
name: evaluator
description: "Independent post-deployment evaluator — evidence-grounded scoring of completed PA deployments"
default_mode: deployment-review
deploy_modes:
  - id: deployment-review
    label: Deployment Review
    phone_visible: true
    mode_type: work
    provider: openai
    agents: [reviewer]
    objective: skills/evaluator/deployment-review-objective.md
    skills:
      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
      - name: pa-registry
        inject-as: shared-skill
    global_docs:
      - skills/evaluator/evaluate-deployment.md
      - skills/requirements/kpi-definitions.md
context:
  organization: sinh-x
  notes: "Launched by `opa evaluate --evaluate-deployment <deploy-id>` for independent, read-only deployment evaluation."
agents:
  - name: reviewer
    role: "Evaluate a completed PA deployment using source-linked evidence, Human Agency, and independent scoring; write evaluator results without mutating workflow state"
    instruction: skills/evaluator/evaluate-deployment.md
objective: |
  Evaluate completed PA deployments independently from the team that performed the work. Read evidence, score the deployment, store evaluator results, and write a concise report. Do not mutate tickets, docs, branches, statuses, or doc_refs unless an explicit future mode allows it.
