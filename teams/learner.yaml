agents:
  - name: gatherer
    role: "Multi-source content ingestion: YouTube videos (7-phase pipeline), RSS feeds, podcasts, and system log scanning"
    skill: skills/knowledge-hub/gather.md

  - name: curator
    role: "Knowledge connection and curation: read recent gatherer outputs, surface cross-references, update knowledge base"
    skill: skills/knowledge-hub/curate.md

  - name: facilitator
    role: "Interactive learning sessions: quiz mode, Q&A, briefing, and live learning support"
    skill: skills/knowledge-hub/facilitate.md

  - name: analyst
    role: "Blind-spot analysis and Johari window tracking at daily/weekly/monthly/quarterly/yearly cadences"
    skill: skills/knowledge-hub/analyze.md

objective: |
  ## Autonomous daily mode (cron / pa deploy learner)

  Run phases in order. Each agent produces a report to its deployment workspace.

  1. gatherer:
     - Process YouTube queue (~/Documents/ai-usage/queue/youtube-video-queue.txt)
     - Scan RSS feeds defined in team variables
     - Scan recent agent system logs (sessions/, deployments/registry.db, daily/ summaries)
     - Output: ingestion report listing what was processed + system anomalies found

  2. curator:
     - Read gatherer's ingestion report
     - Cross-reference new content with existing knowledge base (~/Documents/ai-usage/knowledge-base/)
     - Add cross-reference notes to knowledge-base/learning/ and knowledge-base/intel/
     - Output: curation report with new connections found

  3. analyst:
     - Read johari-tracker.md (~/Documents/ai-usage/agent-teams/learner/johari-tracker.md)
     - Read gatherer and curator reports
     - Determine cadence (daily micro / weekly / monthly / etc.) from tracker timestamps
     - Update johari-tracker.md with today's engagement data
     - Output: cadence-appropriate Johari analysis

  4. Synthesize into intel digest → save to team artifacts + notify via FYI ticket
     - File: ~/Documents/ai-usage/agent-teams/learner/artifacts/YYYY-MM-DD-daily-digest.md
     - Contains: N items processed, system flags, daily Johari micro-note
     - Notify: `pa ticket create --type fyi --assignee sinh --priority low --estimate XS --title "FYI: Learner digest YYYY-MM-DD" --summary "<N items processed, key topics, any flags>"`

  Empty queue / no new content: exit cleanly with "Nothing new to process" and minimal digest confirming the run.

  ## Interactive mode (pa deploy learner --interactive)

  Determine user intent from context:
  - "quiz me on <topic>": facilitator reads knowledge base → generates ≥5 questions → interactive quiz
  - "brief me on <topic>": facilitator reads recent gatherer output → structured briefing
  - "Q&A" / "what do you know about X": facilitator answers from ingested content
  - "join my learning session": facilitator loads relevant notes → assists live

  ## Spike mode (pa deploy learner --mode spike)

  Focused, time-boxed exploration of a single topic provided by Sinh.

  1. facilitator reads the knowledge base for existing context on the topic
  2. Conducts a targeted Q&A / briefing session with Sinh
  3. At end of session, saves a brief spike summary:
     - File: ~/Documents/ai-usage/knowledge-base/learning/YYYY-MM-DD-spike-<topic>.md
     - Contains: key takeaways, open questions, suggested follow-up resources

  ## Key invariants

  - YouTube queue file path must remain ~/Documents/ai-usage/queue/youtube-video-queue.txt (backward compatible)
  - Knowledge base: ~/Documents/ai-usage/knowledge-base/learning/ and knowledge-base/intel/
  - Johari tracker: ~/Documents/ai-usage/agent-teams/learner/johari-tracker.md
  - Intel digest: ~/Documents/ai-usage/agent-teams/learner/artifacts/ + FYI ticket per global standards §4
  - Session logs per global standards §4 (all agents log before shutting down)
