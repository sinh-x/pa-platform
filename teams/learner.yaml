# Ported from frozen PA teams/learner.yaml on 2026-04-26; do not auto-sync, frozen PA is the spec.
name: learner
model: sonnet  # synthesis and analysis require judgment
description: Learning, research & intel team — multi-source knowledge ingestion, curation, interactive learning, and Johari blind-spot analysis
default_mode: background

deploy_modes:
  - id: housekeeping
    label: Housekeeping
    phone_visible: true
    mode_type: housekeeping
    provider: minimax
    agents: []
    objective: skills/global/housekeeping-objective.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: background
    label: Background
    phone_visible: true
    mode_type: work
    provider: minimax
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: foreground
    label: Foreground
    phone_visible: true
    mode_type: work
    provider: minimax
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: interactive
    label: Interactive
    phone_visible: false
    mode_type: interactive
    provider: minimax

  - id: spike
    label: Spike
    phone_visible: true
    mode_type: interactive
    provider: minimax
    agents: [facilitator]
  - id: housekeeping-anthropic
    label: Housekeeping (Anthropic)
    phone_visible: true
    mode_type: housekeeping
    provider: anthropic
    agents: []
    objective: skills/global/housekeeping-objective.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: background-anthropic
    label: Background (Anthropic)
    phone_visible: true
    mode_type: work
    provider: anthropic
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: foreground-anthropic
    label: Foreground (Anthropic)
    phone_visible: true
    mode_type: work
    provider: anthropic
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: interactive-anthropic
    label: Interactive (Anthropic)
    phone_visible: false
    mode_type: interactive
    provider: anthropic
  - id: spike-anthropic
    label: Spike (Anthropic)
    phone_visible: true
    mode_type: interactive
    provider: anthropic
    agents: [facilitator]

context:
  organization: sinh-x
  notes: "Unified learning hub: YouTube, RSS, podcasts, system logs, and Johari blind-spot tracking. Absorbs youtube-processor team. Renamed from knowledge-hub."

