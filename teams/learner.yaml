  # Topics of interest for content filtering and relevance scoring
  topics_of_interest: |
    Learning Science
    AI/LLM developments
    Agent systems
    Personal development
    Parenting
    Finance
    Vietnamese culture

  # Johari window domains (suggested defaults — Sinh to revise after first report)
  johari_domains: |
    Learning Science
    AI/Tech
    Agent System Health
    Personal Health/Wellness
    Parenting
    Finance
