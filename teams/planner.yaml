# Ported from frozen PA teams/planner.yaml on 2026-04-26; do not auto-sync, frozen PA is the spec.
name: planner
model: sonnet # default for synthesis; read-only agents overridden to haiku below
description: "Daily lifecycle & RPM personal planning — plan, track progress, close the day, manage RPM blocks, and weekly reviews"
default_mode: plan

hierarchy:
  team-manager:
    role: "Orchestrate daily lifecycle and RPM planning"
    participates_in: all
  agents:
    - name: session-gatherer
      participates_in: [progress, end]
    - name: jsonl-analyst
      participates_in: [progress, end]
    - name: time-tracker
      participates_in: [progress, end]
    - name: synthesizer
      participates_in: [progress, end-review]

deploy_modes:
  # --- Daily lifecycle modes ---
  - id: housekeeping
    label: Housekeeping
    phone_visible: true
    mode_type: housekeeping
    provider: minimax
    agents: []
    objective: skills/global/housekeeping-objective.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: plan
    label: Plan
    phone_visible: true
    mode_type: work
    provider: minimax
    agents: [] # solo, no sub-agents
    objective: teams/daily/modes/plan.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: plan-review
    label: Plan Review
    phone_visible: false
    mode_type: work
    provider: anthropic
    model: opus
    agents: [] # solo, no sub-agents
    objective: teams/daily/modes/plan-review.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: progress
    label: Progress
    phone_visible: true
    mode_type: work
    provider: minimax
    objective: teams/daily/modes/progress.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: end
    label: End
    phone_visible: true
    mode_type: work
    provider: minimax
    objective: teams/daily/modes/end.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: end-review
    label: End Review
    phone_visible: false
    mode_type: work
    provider: anthropic
    model: opus
    agents: [] # TM spawns synthesizer interactively after Sinh confirms
    objective: teams/daily/modes/end-review.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill

  # --- RPM planning modes ---
  - id: weekly-gather
    label: Weekly Gather
    phone_visible: true
    mode_type: work
    provider: minimax
    agents: []
    objective: skills/rpm/weekly-gather.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: weekly-review
    label: Weekly Review
    phone_visible: true
    mode_type: work
    provider: minimax
    agents: []
    skills:
      - name: pa-session-log
        inject-as: shared-skill
  - id: rpm-manage
    label: RPM Manage
    phone_visible: true
    mode_type: interactive
    provider: minimax
    agents: []
    skills:
      - name: pa-session-log
        inject-as: shared-skill

context:
  organization: sinh-x
  notes: "Merged daily lifecycle + RPM personal planning. 9 modes: plan, plan-review, progress, end, end-review, housekeeping, weekly-gather, weekly-review, rpm-manage"

variables:
  project_root: /home/sinh/git-repos/sinh-x/tools/personal-assistant
  output_dir: ~/Documents/ai-usage/daily
  rpm_blocks: ~/Documents/ai-usage/agent-teams/rpm/rpm-blocks.yaml
  anytype_space: bafyreifs6whb7td4qfzyqx5nh6krdmxosvbzxwnpn5eqeepivm3tc7ps6i.2eaoxbxt3otui

agents:
  # Daily lifecycle agents
  - name: session-gatherer
    role: "Gather session logs from ai-usage folder (human + agent team)"
    skill: skills/daily-summary/gather-sessions.md
    model: haiku # read-only file scan; cost optimization
  - name: jsonl-analyst
    role: "Analyze Claude JSONL session files for stats"
    skill: skills/daily-summary/gather-jsonl-stats.md
    model: haiku # structured data extraction; no synthesis
  - name: time-tracker
    role: "Gather avo time tracking data"
    skill: skills/daily-summary/gather-avo.md
    model: haiku # reads avo output; no synthesis
  - name: synthesizer
    role: "Combine gathered data and produce the output document"
    skill: skills/daily-summary/synthesize.md
    # inherits team-level: sonnet — synthesis requires judgment
    skills:
      - name: pa-session-log
        inject-as: shared-skill

  # RPM planning agents
  - name: planner
    role: "Create and update RPM blocks via guided conversation, sync to Anytype"
    skill: skills/rpm/manage.md
  - name: reviewer
    role: "Guide weekly RPM review — present week data, update MAP items, sync blocks"
    skill: skills/rpm/weekly-review.md
    skills:
      - name: pa-session-log
        inject-as: shared-skill

objective: |
  See teams/daily/modes/ for daily mode-specific objectives.

  ## RPM Mode Objectives

  - **weekly-gather** — Background RPM data collection. Follow skills/rpm/weekly-gather.md.
  - **weekly-review** — Interactive weekly RPM review. Follow skills/rpm/weekly-review.md.
  - **rpm-manage** — Interactive RPM block management. Follow skills/rpm/manage.md.

  Run with: pa deploy planner --mode <mode>
  Available modes: plan, plan-review, progress, end, end-review, housekeeping, weekly-gather, weekly-review, rpm-manage
