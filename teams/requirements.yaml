        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
    global_docs:
      - skills/requirements/review-code-quality.md
      - skills/requirements/review-security.md
      - skills/requirements/review-ops.md
      - skills/requirements/review-ui-uat.md
