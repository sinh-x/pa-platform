# Ported from frozen PA teams/requirements.yaml on 2026-04-26; do not auto-sync, frozen PA is the spec.
name: requirements
model: gpt-5.5 # requirements sessions involve interactive reasoning and structured analysis
description: "Requirements gathering and analysis — structured planning before implementation"
default_mode: analyze
deploy_modes:
  - id: analyze
    label: Analyze
    phone_visible: true
    mode_type: interactive
    agents: [analyst]
    objective: skills/requirements/analyze-objective.md
    skills:
      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
  - id: review
    label: Review
    phone_visible: false
    mode_type: interactive
    agents: [reviewer]
    objective: skills/requirements/review-objective.md
