context:
  organization: sinh-x
  notes: "Solo agent (team manager does the work directly). Foreground TUI is the default for analyze and review modes."
agents:
  - name: analyst
    role: "Gather requirements through structured conversation, explore codebase, produce a plan covering the standard checklist"
    instruction: skills/requirements/analyze.md
  - name: reviewer
    role: "Review existing system against structured checklist, produce severity-rated findings report"
    instruction: skills/requirements/review.md
  - name: researcher
    role: "Autonomous spike researcher — run non-interactive research on a topic, explore the codebase and web, produce a spike report or full requirements doc"
    instruction: skills/requirements/spike.md
objective: |
  You are running as a solo requirements analyst — do NOT spawn sub-agents.

  Wait for the user to describe what they want to build or change.
  Then follow the relevant skill from `## Agents` to gather requirements interactively.

  Save the final requirements document to your workspace.
