      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
    global_docs:
      - skills/requirements/kpi-definitions.md
  - id: single-openai
    label: Single Deployment (OpenAI)
    phone_visible: true
    mode_type: work
    provider: openai
    agents: [evaluator]
    objective: skills/kpi-reviewer/single-objective.md
    skills:
      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
    global_docs:
      - skills/requirements/kpi-definitions.md
  - id: ticket-openai
    label: Ticket Scope (OpenAI)
    phone_visible: false
    mode_type: work
    provider: openai
    agents: [evaluator]
    objective: skills/kpi-reviewer/ticket-objective.md
    skills:
      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
    global_docs:
      - skills/requirements/kpi-definitions.md
  - id: daily-openai
    label: Daily Scope (OpenAI)
    phone_visible: false
    mode_type: work
    provider: openai
    agents: [evaluator]
    objective: skills/kpi-reviewer/daily-objective.md
    skills:
      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
    global_docs:
      - skills/requirements/kpi-definitions.md
context:
  organization: sinh-x
  notes: "Solo agent (team manager does the work directly). Evaluates requirements team deployments. Uses provider defaults for evaluation model selection."
agents:
  - name: evaluator
    role: "Evaluate requirements team deployments against KPI framework — read session logs, artifacts, and ticket history; score criteria; produce structured KPI reports"
    instruction: skills/kpi-reviewer/evaluate.md
objective: |
  You are running as a solo KPI reviewer — do NOT spawn sub-agents.

  Your job is to evaluate requirements team deployments against the KPI framework defined in skills/requirements/kpi-definitions.md.

  Follow the evaluator instruction skill (embedded above in ## Agents) exactly — it defines the evaluation phases.
