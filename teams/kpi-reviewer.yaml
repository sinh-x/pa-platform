# Ported from frozen PA teams/kpi-reviewer.yaml on 2026-04-26; do not auto-sync, frozen PA is the spec.
name: kpi-reviewer
description: "Evaluate requirements team deployments against defined KPI framework — produces scored reports for quality assurance"
default_mode: single
deploy_modes:
  - id: single
    label: Single Deployment
    phone_visible: true
    mode_type: work
    provider: minimax
    agents: [evaluator]
    objective: skills/kpi-reviewer/single-objective.md
    skills:
      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
    global_docs:
      - skills/requirements/kpi-definitions.md
  - id: ticket
    label: Ticket Scope
    phone_visible: false
    mode_type: work
    provider: minimax
    agents: [evaluator]
    objective: skills/kpi-reviewer/ticket-objective.md
    skills:
      - name: pa-cli
        inject-as: shared-skill
      - name: pa-session-log
        inject-as: shared-skill
      - name: pa-ticket-workflow
        inject-as: shared-skill
      - name: pa-startup
        inject-as: shared-skill
      - name: pa-self-improvement
        inject-as: shared-skill
    global_docs:
      - skills/requirements/kpi-definitions.md
  - id: daily
    label: Daily Scope
    phone_visible: false
    mode_type: work
    provider: minimax
    agents: [evaluator]
    objective: skills/kpi-reviewer/daily-objective.md
